version: '3.7'

services:
  mysql:
    image: mysql:5.7
    container_name: database
    volumes:
      - ./mysql/initdb.d:/docker-entrypoint-initdb.d
      - ./mysql/data:/var/lib/mysql # 構築後に実行するSQLを配置(オプション)
    restart: always
    environment:
      MYSQL_DATABASE: test_login
      MYSQL_USER: hogeUser
      MYSQL_PASSWORD: hogehoge
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - 3306:3306
    


  php-apache: # phpのサービス名
    build: ./php # phpフォルダにあるDockerfileでビルド
    volumes:
      - ./html:/var/www/html # htdocsフォルダをapacheのルートディレクトリにマッピング
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - mysql
    container_name: php7.2-trial2
